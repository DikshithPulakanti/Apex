version: '3.9'

services:
  # Your Python application
  app:
    build: .
    env_file: .env
    depends_on:
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - .:/app

  # Neo4j graph database
  neo4j:
    image: neo4j:5.15
    ports:
      - '7474:7474'
      - '7687:7687'
    environment:
      NEO4J_AUTH: neo4j/apexpassword
      NEO4J_PLUGINS: '["graph-data-science"]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ['CMD', 'cypher-shell', '-u', 'neo4j', '-p', 'apexpassword', 'RETURN 1']
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s

  # PostgreSQL relational database
  postgres:
    image: postgres:15
    ports:
      - '5434:5432'
    environment:
      POSTGRES_USER: apex
      POSTGRES_PASSWORD: apexpassword
      POSTGRES_DB: apex_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U apex -d apex_db']
      interval: 5s
      timeout: 5s
      retries: 10

  # Redis cache
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  # Weaviate vector database
  weaviate:
    image: semitechnologies/weaviate:1.27.0
    ports:
      - '8080:8080'
      - '50051:50051'
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      DEFAULT_VECTORIZER_MODULE: 'none'
      ENABLE_MODULES: ''
      CLUSTER_HOSTNAME: 'node1'
    volumes:
      - weaviate_data:/var/lib/weaviate

# Named volumes
volumes:
  neo4j_data:
  postgres_data:
  redis_data:
  weaviate_data: